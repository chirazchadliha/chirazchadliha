<svg width="100%" height="250" viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10002b"/>
      <stop offset="20%" stop-color="#240046"/>
      <stop offset="40%" stop-color="#3c096c"/>
      <stop offset="60%" stop-color="#5a189a"/>
      <stop offset="80%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>

    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0aaff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e0aaff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0aaff"/>
    </linearGradient>

    <clipPath id="roundedCorner">
      <rect width="1200" height="250" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedCorner)">

    <!-- Background WITHOUT dots -->
    <rect width="1200" height="250" fill="url(#bgGrad)"/>

    <!-- Floating Orbs -->
    <circle cx="140" cy="70" r="70" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 25,-20; 0,0" dur="7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1070" cy="190" r="95" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -30,15; 0,0" dur="9s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1000" cy="55" r="50" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 15,25; 0,0" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Decorative lines -->
    <g stroke="#e0aaff" stroke-opacity="0.25" stroke-width="1" fill="none">
      <line x1="60" y1="210" x2="170" y2="160"/>
      <line x1="170" y1="160" x2="280" y2="200"/>
      <line x1="990" y1="60" x2="1090" y2="110"/>
      <line x1="1090" y1="110" x2="1140" y2="40"/>
    </g>

    <!-- Nodes -->
    <g fill="#e0aaff" fill-opacity="0.55">
      <circle cx="60" cy="210" r="3.5"/>
      <circle cx="170" cy="160" r="3.5"/>
      <circle cx="280" cy="200" r="3.5"/>
      <circle cx="990" cy="60" r="3.5"/>
      <circle cx="1090" cy="110" r="3.5"/>
      <circle cx="1140" cy="40" r="3.5"/>
    </g>

    <!-- Text -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,25; 0,0" dur="1.2s" fill="freeze"
        calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>

      <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>

      <text x="600" y="125"
        text-anchor="middle"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-size="58"
        font-weight="700"
        fill="url(#textGrad)">
        Chiraz Chadli
      </text>
    </g>

    <!-- Subtitle -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,25; 0,0" dur="1.2s" begin="0.4s"
        fill="freeze" calcMode="spline"
        keySplines="0.25 0.46 0.45 0.94"/>

      <animate attributeName="opacity" values="0;0;0.9" dur="1.2s" begin="0.4s" fill="freeze"/>

      <text x="600" y="172"
        text-anchor="middle"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-size="22"
        fill="#e0aaff">

        Data Science | Web Developer

        <tspan>
          <animate attributeName="opacity"
            values="1;1;0;0"
            keyTimes="0;0.49;0.5;1"
            dur="1s"
            begin="1.6s"
            repeatCount="indefinite"/>
          ▌
        </tspan>

      </text>
    </g>

  </g>
</svg>

