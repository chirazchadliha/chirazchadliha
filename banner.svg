<svg width="1200" height="250" viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10002b"/>
      <stop offset="20%" stop-color="#240046"/>
      <stop offset="40%" stop-color="#3c096c"/>
      <stop offset="60%" stop-color="#5a189a"/>
      <stop offset="80%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>

    <radialGradient id="orbGrad">
      <stop offset="0%" stop-color="#e0aaff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e0aaff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGrad">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0aaff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="250" rx="22" fill="url(#bgGrad)"/>

  <!-- ORB 1 (drift simulation) -->
  <circle cx="140" cy="70" r="70" fill="url(#orbGrad)">
    <animate attributeName="cx" values="140;165;140" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;90;70" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- ORB 2 -->
  <circle cx="1070" cy="190" r="95" fill="url(#orbGrad)">
    <animate attributeName="cx" values="1070;1040;1070" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="190;170;190" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- ORB 3 -->
  <circle cx="1000" cy="55" r="50" fill="url(#orbGrad)">
    <animate attributeName="cx" values="1000;1020;1000" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="55;80;55" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- TEXT -->
  <text x="600" y="120"
        text-anchor="middle"
        font-family="Trebuchet MS, Verdana"
        font-size="58"
        font-weight="700"
        fill="url(#textGrad)">
    Chiraz Chadli
    <animate attributeName="opacity"
             values="0;1"
             dur="1.5s"
             fill="freeze"/>
  </text>

  <!-- SUBTITLE -->
  <text x="600" y="170"
        text-anchor="middle"
        font-family="Trebuchet MS, Verdana"
        font-size="22"
        fill="#e0aaff">
    Data Science | Web Developer
    <animate attributeName="opacity"
             values="0;1"
             dur="2s"
             fill="freeze"/>
  </text>

  <!-- CURSOR blink -->
  <text x="815" y="170" font-size="22" fill="#e0aaff">
    ▌
    <animate attributeName="opacity"
             values="1;0;1"
             dur="1s"
             repeatCount="indefinite"/>
  </text>

</svg>
