<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070012"/>
      <stop offset="50%" stop-color="#10002b"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>
    <linearGradient id="btnGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>
    <linearGradient id="btnGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a189a"/>
      <stop offset="100%" stop-color="#7b2cbf"/>
    </linearGradient>
    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2cbf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7b2cbf" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card">
      <rect width="900" height="200" rx="20"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#card)">
    <!-- BG -->
    <rect width="900" height="200" fill="url(#bgGrad)"/>

    <!-- Orbs -->
    <circle cx="800" cy="40" r="80" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,15; 0,0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="170" r="60" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 15,-10; 0,0" dur="6s" repeatCount="indefinite"/>
    </circle>

    <!-- Subtle grid lines -->
    <g stroke="#7b2cbf" stroke-opacity="0.07" stroke-width="1">
      <line x1="0" y1="50" x2="900" y2="50"/>
      <line x1="0" y1="100" x2="900" y2="100"/>
      <line x1="0" y1="150" x2="900" y2="150"/>
      <line x1="200" y1="0" x2="200" y2="200"/>
      <line x1="450" y1="0" x2="450" y2="200"/>
      <line x1="700" y1="0" x2="700" y2="200"/>
    </g>

    <!-- LEFT: Title -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,20; 0,0" dur="1s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="4s" begin="1s" repeatCount="indefinite" additive="sum" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
      <text x="60" y="85" font-family="Trebuchet MS, Verdana, sans-serif" font-size="36" font-weight="700" fill="url(#titleGrad)">Connect with me</text>
    </g>

    <!-- LEFT: Subtitle -->
    <g>
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.5s" fill="freeze"/>
      <text x="60" y="118" font-family="Trebuchet MS, Verdana, sans-serif" font-size="13" fill="#c4b5fd" opacity="0.85">Always building something</text>
      <text x="60" y="136" font-family="Trebuchet MS, Verdana, sans-serif" font-size="13" fill="#c4b5fd" opacity="0.85">"high-class" and efficient.</text>
    </g>

    <!-- Vertical divider -->
    <line x1="390" y1="30" x2="390" y2="170" stroke="#7b2cbf" stroke-opacity="0.35" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0;0.35" dur="1s" begin="0.8s" fill="freeze"/>
    </line>

    <!-- RIGHT: Email button -->
    <g>
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.9s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="30,0; 0,0" dur="0.8s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>

      <!-- Email pill button -->
      <rect x="420" y="55" width="440" height="42" rx="21" fill="url(#btnGrad1)" opacity="0.9"/>
      <rect x="420" y="55" width="440" height="42" rx="21" fill="none" stroke="#e0aaff" stroke-width="1" stroke-opacity="0.3"/>

      <!-- Mail icon embedded -->
      <image href="data:image/svg+xml;base64," x="436" y="66" width="20" height="20"/>

      <text x="470" y="81" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" fill="#ffffff" font-weight="600">chadlihch@gmail.com</text>
    </g>

    <!-- RIGHT: LinkedIn button -->
    <g>
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.2s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="30,0; 0,0" dur="0.8s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>

      <!-- LinkedIn pill button -->
      <rect x="420" y="112" width="440" height="42" rx="21" fill="url(#btnGrad2)" opacity="0.9"/>
      <rect x="420" y="112" width="440" height="42" rx="21" fill="none" stroke="#e0aaff" stroke-width="1" stroke-opacity="0.3"/>

      <!-- LinkedIn icon embedded -->
      <image href="data:image/svg+xml;base64," x="436" y="120" width="22" height="22"/>

      <text x="472" y="138" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" fill="#ffffff" font-weight="600">chiraz-chadli-841869255</text>
    </g>

  </g>
</svg>
