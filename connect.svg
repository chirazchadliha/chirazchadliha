<svg width="100%" height="250" viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- DARK GITHUB STYLE BACKGROUND -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070012"/>
      <stop offset="25%" stop-color="#10002b"/>
      <stop offset="50%" stop-color="#140033"/>
      <stop offset="75%" stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#22004d"/>
    </linearGradient>

    <!-- SOFT PURPLE ORBS -->
    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2cbf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7b2cbf" stop-opacity="0"/>
    </radialGradient>

    <!-- TEXT GRADIENT -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7b2cbf"/>
    </linearGradient>

    <clipPath id="roundedCorner">
      <rect width="1200" height="250" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedCorner)">

    <!-- BACKGROUND -->
    <rect width="1200" height="250" fill="url(#bgGrad)"/>

    <!-- ANIMATED PURPLE ORBS (unchanged) -->
    <circle cx="140" cy="70" r="70" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 25,-20; 0,0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1070" cy="190" r="95" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -30,15; 0,0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="55" r="50" fill="url(#orbGrad)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 15,25; 0,0" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- DECOR LINES (unchanged) -->
    <g stroke="#7b2cbf" stroke-opacity="0.12" stroke-width="1" fill="none">
      <line x1="60" y1="210" x2="170" y2="160"/>
      <line x1="170" y1="160" x2="280" y2="200"/>
      <line x1="990" y1="60" x2="1090" y2="110"/>
      <line x1="1090" y1="110" x2="1140" y2="40"/>
    </g>

    <!-- NODES (unchanged) -->
    <g fill="#7b2cbf" fill-opacity="0.25">
      <circle cx="60" cy="210" r="3.5"/>
      <circle cx="170" cy="160" r="3.5"/>
      <circle cx="280" cy="200" r="3.5"/>
      <circle cx="990" cy="60" r="3.5"/>
      <circle cx="1090" cy="110" r="3.5"/>
      <circle cx="1140" cy="40" r="3.5"/>
    </g>

    <!-- TITLE (slightly adjusted Y) -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,25; 0,0" dur="1.2s" fill="freeze"
        calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-6; 0,0" dur="4s" begin="1.2s"
        repeatCount="indefinite"/>

      <text x="600" y="65"
        text-anchor="middle"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-size="44"
        font-weight="700"
        fill="url(#textGrad)">
        Connect with me
      </text>
    </g>

    <!-- TAGLINE (adjusted Y) -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,25; 0,0" dur="1.2s" begin="0.4s" fill="freeze"/>
      <animate attributeName="opacity" values="0;0;0.9" dur="1.2s" begin="0.4s" fill="freeze"/>

      <text x="600" y="100"
        text-anchor="middle"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-size="16"
        fill="#c4b5fd">
        Always building something "high‑class" and efficient.
      </text>
    </g>

    <!-- LINE UNDER TAGLINE (adjusted Y) -->
    <line x1="350" y1="120" x2="850" y2="120"
      stroke="url(#textGrad)"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-dasharray="500"
      stroke-dashoffset="500">
      <animate attributeName="stroke-dashoffset"
        values="500;0"
        dur="1.2s"
        begin="1.2s"
        fill="freeze"/>
    </line>

    <!-- CONTACT SECTION -->
    <!-- Email (logos now WHITE) -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,30; 0,0" dur="1.2s" begin="0.8s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="1.2s" begin="0.8s" fill="freeze"/>

      <!-- Envelope icon – fully white -->
      <g transform="translate(320, 150)">
        <rect x="0" y="0" width="40" height="28" rx="6" fill="none" stroke="#ffffff" stroke-width="1.8"/>
        <polyline points="0,0 20,14 40,0" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round"/>
      </g>

      <!-- Email text -->
      <text x="380" y="170"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-size="16"
        fill="#ffffff">
        chiraz.chadliha@example.com
      </text>
    </g>

    <!-- LinkedIn (logo now WHITE, no blue) -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,30; 0,0" dur="1.2s" begin="1s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="1.2s" begin="1s" fill="freeze"/>

      <!-- LinkedIn icon – white outline -->
      <g transform="translate(320, 190)">
        <rect x="0" y="0" width="40" height="28" rx="6" fill="none" stroke="#ffffff" stroke-width="1.8"/>
        <text x="20" y="19" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" font-family="Arial">in</text>
      </g>

      <!-- LinkedIn text -->
      <text x="380" y="210"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-size="16"
        fill="#ffffff">
        linkedin.com/in/chirazchadliha
      </text>
    </g>

  </g>
</svg>
