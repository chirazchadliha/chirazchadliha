<svg width="560" height="260" viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10002b"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="260" rx="18"
        fill="url(#bgGrad)"
        stroke="url(#borderGrad)"
        stroke-width="2.5"/>

  <!-- Animated Title -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0;0,-5;0,0"
      dur="4s"
      repeatCount="indefinite"/>

    <text x="280"
          y="50"
          text-anchor="middle"
          fill="#c4b5fd"
          font-size="26"
          font-family="Trebuchet MS, Verdana, sans-serif"
          font-weight="700">
      🛠 Tech Stack
    </text>
  </g>

  <!-- Icons -->
  <foreignObject x="45" y="90" width="470" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml"
         style="display:flex;justify-content:center;align-items:center;">

      <img
        src="https://skillicons.dev/icons?i=nodejs,js,html,css,laravel,python,react,flutter,github&theme=dark"
        width="470"/>

    </div>
  </foreignObject>

</svg>
