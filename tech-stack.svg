<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 500 300">
  <defs>
    <!-- Glow filter for title animation -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background + border -->
  <rect x="5" y="5" width="490" height="290" rx="18" fill="#10002b" stroke="url(#borderGrad)" stroke-width="2.5"/>

  <!-- Animated Title -->
  <text x="250" y="55" text-anchor="middle" fill="#c4b5fd" font-size="26" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="bold" filter="url(#glow)">
    🛠 Tech Stack
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3s" repeatCount="indefinite" />
  </text>

  <!-- Tech Logos (from skillicons.dev) -->
  <image href="https://skillicons.dev/icons?i=nodejs,js,html,css,laravel,python,react,flutter,github&theme=dark" 
         x="25" y="80" width="450" height="180" 
         preserveAspectRatio="xMidYMid meet" />
</svg>
