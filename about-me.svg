<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="600" height="160" rx="15" fill="#10002b"/>

  <!-- border -->
  <rect x="2" y="2" width="596" height="156" rx="15"
        fill="none" stroke="url(#borderGrad)" stroke-width="2"/>

  <!-- TITLE FLOATING ONLY -->
  <text x="300" y="45"
        text-anchor="middle"
        fill="#c4b5fd"
        font-size="20"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-weight="700">

    Hey There !

    <animateTransform attributeName="transform"
      type="translate"
      values="0,0; 0,-6; 0,0"
      dur="3s"
      repeatCount="indefinite"/>

  </text>

  <!-- TEXT STATIC -->
  <text x="300" y="80"
        text-anchor="middle"
        fill="#ffffff"
        font-size="12"
        font-family="Trebuchet MS, Verdana, sans-serif">

    <tspan x="300" dy="0">A passionate Data Science student and Web Developer</tspan>
    <tspan x="300" dy="16">who enjoys building clean and useful projects.</tspan>
    <tspan x="300" dy="16">Always learning, always evolving ✨</tspan>

  </text>

</svg>
