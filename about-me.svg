<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10002b"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="600" height="300" rx="18" fill="url(#bgGrad)"/>

  <!-- border -->
  <rect x="3" y="3" width="594" height="294" rx="18"
        fill="none" stroke="url(#borderGrad)" stroke-width="2"/>

  <!-- TITLE (LEFT) -->
  <text x="40" y="60"
        fill="#c4b5fd"
        font-size="26"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-weight="700">
    Hey There !
  </text>

  <!-- PARAGRAPH (LEFT ALIGNED) -->
  <text x="40" y="120"
        fill="#ffffff"
        font-size="14"
        font-family="Trebuchet MS, Verdana, sans-serif">

    <tspan x="40" dy="0">
      I'm Chiraz, a passionate Data Science student and Web Developer
    </tspan>

    <tspan x="40" dy="22">
      I enjoy building clean, creative and useful projects.
    </tspan>

    <tspan x="40" dy="22">
      I love learning new technologies and improving my skills step by step.
    </tspan>

    <tspan x="40" dy="22">
      Always curious, always evolving (‾◡◝)
    </tspan>

  </text>

</svg>
