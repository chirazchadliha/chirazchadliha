<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10002b"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="600" height="400" rx="18" fill="url(#bgGrad)"/>

  <!-- border -->
  <rect x="3" y="3" width="594" height="394" rx="18"
        fill="none" stroke="url(#borderGrad)" stroke-width="2"/>

  <!-- TITLE -->
  <text x="300" y="70"
        text-anchor="middle"
        fill="#c4b5fd"
        font-size="28"
        font-family="Trebuchet MS, Verdana, sans-serif"
        font-weight="700">
    Hey There !
  </text>

  <!-- PARAGRAPH -->
  <text x="300" y="140"
        text-anchor="middle"
        fill="#ffffff"
        font-size="15"
        font-family="Trebuchet MS, Verdana, sans-serif">

    <tspan x="300" dy="0">
      I'm Chiraz, a passionate Data Science student and Web Developer
    </tspan>

    <tspan x="300" dy="26">
      I enjoy building clean, creative and useful projects that solve real problems.
    </tspan>

    <tspan x="300" dy="26">
      I love learning new technologies, exploring AI and web development,
    </tspan>

    <tspan x="300" dy="26">
      and turning ideas into real applications step by step.
    </tspan>

    <tspan x="300" dy="26">
      Always curious, always improving, always evolving (‾◡◝)
    </tspan>

  </text>

</svg>
